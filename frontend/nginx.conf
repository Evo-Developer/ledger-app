server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/ledger-app.crt;
    ssl_certificate_key /etc/nginx/certs/ledger-app.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Explicitly serve login page as index
    location = / {
        try_files /index.html =404;
    }

    # Serve app page (protected by client-side auth)
    location = /app.html {
        try_files /app.html =404;
    }

        # Admin knowledge base (protected by client-side auth check)
        location = /admin-docs.html {
            try_files /admin-docs.html =404;
        }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Nginx runtime status for admin app insights (queried server-to-server by backend)
    location /nginx_status {
        stub_status;
        allow all;
    }
}
