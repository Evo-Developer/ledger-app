server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/ledger-app.crt;
    ssl_certificate_key /etc/nginx/certs/ledger-app.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so backend hostname is always re-resolved
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/manifest+json;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://localhost:8000 http://localhost:8000 https://127.0.0.1:8000 http://127.0.0.1:8000 ws: wss:; frame-src 'self' https://s.tradingview.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Cache static assets to speed up repeat visits
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # PWA service worker and manifest
    location = /service-worker.js {
        try_files /service-worker.js =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires 0;
    }

    location = /manifest.webmanifest {
        try_files /manifest.webmanifest =404;
        add_header Cache-Control "no-cache" always;
    }

    # Explicitly serve login page as index
    location = / {
        try_files /index.html =404;
    }

    # Serve app page (protected by client-side auth)
    location = /app.html {
        try_files /app.html =404;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

        # Admin knowledge base (protected by client-side auth check)
        location = /admin-docs.html {
            try_files /admin-docs.html =404;
        }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass $backend_upstream/health;
    }

    # Nginx runtime status for admin app insights (queried server-to-server by backend)
    location /nginx_status {
        stub_status;
        allow all;
    }
}
