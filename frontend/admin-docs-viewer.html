<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Docs Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --primary: #58a6ff;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --code-font: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(6px);
  }

  .btn {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    text-decoration: none;
    cursor: pointer;
  }

  .btn:hover { border-color: var(--primary); color: var(--primary); }

  .title {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px 18px 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .error {
    border-left: 4px solid #f85149;
  }

  .markdown-body {
    line-height: 1.65;
    font-size: 14px;
  }

  .markdown-body h1,
  .markdown-body h2,
  .markdown-body h3,
  .markdown-body h4 {
    margin-top: 1.3em;
    margin-bottom: 0.55em;
    line-height: 1.25;
  }

  .markdown-body p { margin: 0.7em 0; }
  .markdown-body ul,
  .markdown-body ol { margin: 0.7em 0; padding-left: 1.4em; }
  .markdown-body li { margin: 0.3em 0; }

  .markdown-body code {
    font-family: var(--code-font);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 5px;
    font-size: 12px;
  }

  .markdown-body pre {
    overflow-x: auto;
    background: #0b0f14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: var(--code-font);
    font-size: 12px;
  }

  .markdown-body pre code {
    border: 0;
    background: transparent;
    padding: 0;
    font-size: 12px;
  }

  .markdown-body blockquote {
    margin: 1em 0;
    padding: 8px 12px;
    border-left: 4px solid var(--primary);
    background: var(--surface2);
    color: var(--text-muted);
  }

  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    display: block;
    overflow-x: auto;
  }

  .markdown-body th,
  .markdown-body td {
    border: 1px solid var(--border);
    padding: 7px 9px;
    text-align: left;
    white-space: nowrap;
  }

  .markdown-body a {
    color: var(--primary);
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="btn" href="/admin-docs.html">← Back to Admin Docs</a>
    <a class="btn" href="/app.html?tab=settings">App</a>
    <a class="btn" id="rawLink" href="#" target="_blank" rel="noopener">Open Raw .md</a>
    <div class="title" id="docTitle">Loading document...</div>
  </div>

  <main class="page">
    <section class="card markdown-body" id="content">
      <p>Loading...</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const ALLOWED_DOCS = new Set([
      'ARCHITECTURE.md',
      'FLOW-DIAGRAMS.md',
      'OPERATIONS-GUIDE.md',
      'DEPLOYMENT.md',
      'README.md',
      'COMPLIANCE-BASELINE.md'
    ]);

    function getRequestedDoc() {
      const params = new URLSearchParams(window.location.search);
      const doc = params.get('doc') || 'README.md';
      return ALLOWED_DOCS.has(doc) ? doc : null;
    }

    async function renderDoc() {
      const doc = getRequestedDoc();
      const titleEl = document.getElementById('docTitle');
      const contentEl = document.getElementById('content');
      const rawLinkEl = document.getElementById('rawLink');

      if (!doc) {
        titleEl.textContent = 'Invalid document';
        contentEl.classList.add('error');
        contentEl.innerHTML = '<h2>Invalid document request</h2><p>The requested document is not allowed.</p>';
        return;
      }

      const rawUrl = '/admin-docs/' + encodeURIComponent(doc);
      rawLinkEl.href = rawUrl;
      titleEl.textContent = doc;

      try {
        const res = await fetch(rawUrl, { cache: 'no-store' });
        if (!res.ok) {
          throw new Error('Failed to load ' + doc + ' (' + res.status + ')');
        }

        const markdown = await res.text();
        const html = marked.parse(markdown, {
          gfm: true,
          breaks: false,
          headerIds: true,
          mangle: false
        });
        contentEl.innerHTML = DOMPurify.sanitize(html);
      } catch (err) {
        contentEl.classList.add('error');
        contentEl.innerHTML = '<h2>Unable to load document</h2><p>' + String(err.message || err) + '</p><p>Make sure docker frontend has the admin-docs volume mounted.</p>';
      }
    }

    renderDoc();
  </script>
</body>
</html>
