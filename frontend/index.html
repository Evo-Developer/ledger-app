<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Login</title>
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FinApp">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/assets/FinApp.png">
    <link rel="icon" type="image/png" href="./assets/FinApp.png">
    <link rel="preload" href="/assets/FinApp.png" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --border: #d4e2f0;
            --text: #1a202c;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-light: #60a5fa;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 16px;
            --shadow: 0 2px 8px rgba(59, 130, 246, 0.08);
            --shadow-lg: 0 12px 32px rgba(59, 130, 246, 0.15);
            --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        body {
            font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .logo img {
            width: min(320px, 78vw);
            height: auto;
            display: block;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .install-app-btn {
            margin-top: 14px;
            border: none;
            border-radius: 999px;
            background: var(--gradient-primary);
            color: #ffffff;
            padding: 9px 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: none;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .install-app-btn:hover {
            filter: brightness(1.04);
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius);
            padding: 2px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-family: inherit;
        }

        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--surface);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #d1fae5;
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .helper-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 16px;
        }
        .login-mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .login-mode-btn {
            border: 1px solid var(--border);
            background: #f8fbff;
            color: var(--text-secondary);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .login-mode-btn.active {
            border-color: var(--accent);
            color: var(--accent-dark);
            background: #ebf2ff;
        }
        .admin-warning {
            display: none;
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #f59e0b;
            background: #fff7e8;
            color: #92400e;
            font-size: 13px;
            line-height: 1.4;
        }
        .admin-warning.show {
            display: block;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak .strength-fill {
            width: 33%;
            background: var(--danger);
        }

        .strength-medium .strength-fill {
            width: 66%;
            background: var(--warning);
        }

        .strength-strong .strength-fill {
            width: 100%;
            background: var(--success);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 24px;
            }

            .logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <img src="./assets/FinApp.png" alt="FinApp" />
            </div>
            <div class="tagline">Track your finances with clarity</div>
            <button type="button" id="installAppBtn" class="install-app-btn" onclick="handleInstallApp()">📲 Install App</button>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login', this)">Login</button>
                <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register', this)">Register</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="login-mode-switch">
                    <button type="button" class="login-mode-btn active" id="userLoginModeBtn" onclick="setLoginMode('user')">👤 User Login</button>
                    <button type="button" class="login-mode-btn" id="adminLoginModeBtn" onclick="setLoginMode('admin')">🛡️ Admin Login</button>
                </div>
                <div id="adminLoginWarning" class="admin-warning">
                    ⚠️ Admin access is restricted. Only authorized administrators should continue.
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="loginUsername" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="loginPassword" required placeholder="Enter your password">
                </div>
                <div class="form-group" id="loginMfaGroup" style="display: none;">
                    <label class="form-label">Authenticator Code</label>
                    <input type="text" class="form-input" id="loginMfaCode" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter 6-digit MFA code">
                    <div class="helper-text" id="loginMfaHint" style="margin-top: 6px;">Enter the 6-digit code from your authenticator app.</div>
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    Sign In
                </button>
                <div class="helper-text">
                    First time here? Switch to Register tab to create an account.
                </div>
                <div style="text-align:center; margin-top: 12px;">
                    <button type="button" onclick="showForgotPassword()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline;padding:0;">Forgot password?</button>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <div id="forgotPasswordPanel" style="display:none;">
                <div class="form-group">
                    <label class="form-label">Enter your account email address</label>
                    <input type="email" class="form-input" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
                </div>
                <button type="button" class="btn" id="forgotBtn" onclick="handleForgotPassword()">Send Reset Link</button>
                <div class="helper-text" style="margin-top: 14px;">
                    <button type="button" onclick="hideForgotPassword()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline;padding:0;">← Back to Login</button>
                </div>
            </div>

            <!-- Reset Password Form -->
            <div id="resetPasswordPanel" style="display:none;">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="resetNewPassword" placeholder="Enter new password" minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-input" id="resetConfirmPassword" placeholder="Confirm new password" minlength="8" autocomplete="new-password">
                </div>
                <button type="button" class="btn" id="resetBtn" onclick="handleResetPassword()">Set New Password</button>
                <div class="helper-text" style="margin-top: 14px;">
                    <a onclick="hideForgotPassword()" style="color:var(--accent);cursor:pointer;font-size:13px;text-decoration:underline;">← Back to Login</a>
                </div>
            </div>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="registerFullName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="registerEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="registerUsername" required placeholder="Choose a username" minlength="3">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="registerPassword" required placeholder="Create a strong password" minlength="6" oninput="checkPasswordStrength(this.value)">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span id="strengthText"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="registerConfirmPassword" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn" id="registerBtn">
                    Create Account
                </button>
                <div class="helper-text">
                    Already have an account? Switch to Login tab.
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentLoginMode = 'user';
        let mfaChallengeActive = false;

        function getApiBaseUrls() {
            const urls = [];
            const pushUrl = (value) => {
                if (value && !urls.includes(value)) {
                    urls.push(value);
                }
            };

            pushUrl(window.API_BASE_URL);
            pushUrl(window.location.origin + '/api');

            if (['localhost', '127.0.0.1'].includes(window.location.hostname) && window.location.port !== '8000') {
                pushUrl(`${window.location.protocol}//${window.location.hostname}:8000/api`);
            }

            return urls;
        }

        async function parseResponseBody(response) {
            if (response.status === 204) {
                return null;
            }

            const text = await response.text();
            if (!text) {
                return null;
            }

            const contentType = (response.headers.get('content-type') || '').toLowerCase();
            const isJson = contentType.includes('application/json') || contentType.includes('+json');

            if (isJson) {
                try {
                    return JSON.parse(text);
                } catch (error) {
                    throw new Error('The API returned invalid JSON.');
                }
            }

            return {
                rawText: text,
                isHtml: text.trim().startsWith('<')
            };
        }

        function getErrorMessage(response, payload, fallbackMessage) {
            if (payload && typeof payload === 'object' && !payload.isHtml) {
                return payload.detail || payload.message || fallbackMessage;
            }

            if (payload && payload.isHtml) {
                return 'The app reached an HTML page instead of the API. Check that the frontend is pointing to the backend.';
            }

            return fallbackMessage;
        }

        async function fetchApi(path, options = {}) {
            const baseUrls = getApiBaseUrls();
            let lastError = null;

            for (let index = 0; index < baseUrls.length; index += 1) {
                const baseUrl = baseUrls[index];

                try {
                    const response = await fetch(`${baseUrl}${path}`, options);
                    const payload = await parseResponseBody(response);
                    const shouldRetry = payload && payload.isHtml && index < baseUrls.length - 1;

                    if (response.ok && !(payload && payload.isHtml)) {
                        return { response, data: payload };
                    }

                    const fallbackMessage = `Request failed: ${response.status} ${response.statusText}`;
                    const errorMessage = getErrorMessage(response, payload, fallbackMessage);

                    if (shouldRetry) {
                        lastError = new Error(errorMessage);
                        continue;
                    }
                    const requestError = new Error(errorMessage);
                    requestError.status = response.status;
                    throw requestError;
                } catch (error) {
                    lastError = error;
                    if (error && error.status) {
                        throw error;
                    }
                    if (index === baseUrls.length - 1) {
                        throw error;
                    }
                }
            }

            throw lastError || new Error('API request failed');
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                // Verify token is valid
                verifyToken(token);
            }
        });

        async function verifyToken(token) {
            try {
                const { response } = await fetchApi('/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    // Token is valid, redirect to app
                    window.location.href = '/app.html';
                } else {
                    // Token invalid, clear it
                    localStorage.removeItem('token');
                }
            } catch (error) {
                console.error('Token verification failed:', error);
                localStorage.removeItem('token');
            }
        }

        function switchAuthTab(tab, element = null) {
            // Update tab buttons
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            const tabButton = element || document.querySelector(`.auth-tab[data-tab="${tab}"]`);
            if (tabButton) {
                tabButton.classList.add('active');
            }

            // Update forms
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + 'Form').classList.add('active');

            if (tab !== 'login') {
                const warningEl = document.getElementById('adminLoginWarning');
                if (warningEl) warningEl.classList.remove('show');
            } else {
                setLoginMode(currentLoginMode);
            }

            // Clear messages
            hideMessages();
        }

        function setLoginMode(mode) {
            currentLoginMode = mode === 'admin' ? 'admin' : 'user';
            const userBtn = document.getElementById('userLoginModeBtn');
            const adminBtn = document.getElementById('adminLoginModeBtn');
            const warningEl = document.getElementById('adminLoginWarning');
            const loginBtn = document.getElementById('loginBtn');

            if (userBtn) userBtn.classList.toggle('active', currentLoginMode === 'user');
            if (adminBtn) adminBtn.classList.toggle('active', currentLoginMode === 'admin');
            if (warningEl) warningEl.classList.toggle('show', currentLoginMode === 'admin');
            if (loginBtn) loginBtn.textContent = currentLoginMode === 'admin' ? 'Sign In as Admin' : 'Sign In';
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function setMfaChallenge(active, message = '') {
            mfaChallengeActive = !!active;
            const group = document.getElementById('loginMfaGroup');
            const codeInput = document.getElementById('loginMfaCode');
            const hint = document.getElementById('loginMfaHint');
            const btn = document.getElementById('loginBtn');

            if (group) group.style.display = mfaChallengeActive ? '' : 'none';
            if (!mfaChallengeActive && codeInput) codeInput.value = '';
            if (hint && message) hint.textContent = message;
            if (btn) {
                btn.textContent = mfaChallengeActive
                    ? (currentLoginMode === 'admin' ? 'Verify Admin MFA' : 'Verify MFA')
                    : (currentLoginMode === 'admin' ? 'Sign In as Admin' : 'Sign In');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
                const mfaCodeInput = document.getElementById('loginMfaCode');
                const mfaCode = mfaCodeInput ? mfaCodeInput.value.trim() : '';
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in...';
            hideMessages();

            try {
                const formData = new URLSearchParams();
                formData.append('grant_type', 'password');
                formData.append('username', username);
                formData.append('password', password);
                if (mfaCode) {
                    formData.append('mfa_code', mfaCode);
                }

                const { data } = await fetchApi('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                if (data && data.mfa_required && !data.access_token) {
                    setMfaChallenge(true, data.mfa_message || 'Enter the code from your authenticator app to continue.');
                    showError(data.mfa_message || 'MFA code required');
                    if (mfaCodeInput) {
                        mfaCodeInput.focus();
                        mfaCodeInput.select();
                    }
                    return;
                }
                
                // Store token
                localStorage.setItem('token', data.access_token);
                setMfaChallenge(false);
                
                // Show success and redirect
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/app.html';
                }, 1000);

            } catch (error) {
                const message = error.message || 'Login failed';
                const blockedOrDisabled = error.status === 403 || /blocked|disabled|inactive user account/i.test(message);
                const invalidCredentials = error.status === 401 || /invalid credentials|incorrect username|incorrect password|invalid username/i.test(message);
                const requiresMfa = /mfa code required/i.test(message);
                const invalidMfa = /invalid mfa code/i.test(message);

                if (blockedOrDisabled) {
                    setMfaChallenge(false);
                    showError('User account is blocked or disabled. Please contact an administrator.');
                } else if (invalidCredentials) {
                    setMfaChallenge(false);
                    showError('Username or password is incorrect.');
                } else if (requiresMfa) {
                    setMfaChallenge(true, 'Enter the code from your authenticator app to continue.');
                    showError('MFA code required');
                    if (mfaCodeInput) {
                        mfaCodeInput.focus();
                    }
                } else if (invalidMfa) {
                    setMfaChallenge(true, 'The code was not accepted. Enter a fresh code and try again.');
                    showError('Invalid MFA code');
                    if (mfaCodeInput) {
                        mfaCodeInput.focus();
                        mfaCodeInput.select();
                    }
                } else {
                    setMfaChallenge(false);
                    showError(message);
                }
                btn.disabled = false;
                btn.textContent = mfaChallengeActive
                    ? (currentLoginMode === 'admin' ? 'Verify Admin MFA' : 'Verify MFA')
                    : (currentLoginMode === 'admin' ? 'Sign In as Admin' : 'Sign In');
            }
            if (loginBtn) {
                loginBtn.textContent = mfaChallengeActive
                    ? (currentLoginMode === 'admin' ? 'Verify Admin MFA' : 'Verify MFA')
                    : (currentLoginMode === 'admin' ? 'Sign In as Admin' : 'Sign In');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('registerFullName').value;
            const email = document.getElementById('registerEmail').value;
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const btn = document.getElementById('registerBtn');

            // Validate passwords match
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Validate password strength
            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating account...';
            hideMessages();

            try {
                await fetchApi('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        username,
                        password,
                        full_name: fullName
                    })
                });
                
                // Show success
                showSuccess('Account created successfully! Please login.');
                
                // Clear form
                document.getElementById('registerForm').reset();
                
                // Switch to login tab after 2 seconds
                setTimeout(() => {
                    document.querySelector('.auth-tab').click();
                    // Pre-fill username
                    document.getElementById('loginUsername').value = username;
                }, 2000);

            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }

        function checkPasswordStrength(password) {
            const strengthBar = document.querySelector('.password-strength');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            if (!password) {
                strengthBar.className = 'password-strength';
                strengthText.textContent = '';
                return;
            }

            let strength = 0;
            
            // Length
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            
            // Complexity
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            if (strength <= 2) {
                strengthBar.className = 'password-strength strength-weak';
                strengthText.textContent = 'Weak password';
            } else if (strength <= 4) {
                strengthBar.className = 'password-strength strength-medium';
                strengthText.textContent = 'Medium strength';
            } else {
                strengthBar.className = 'password-strength strength-strong';
                strengthText.textContent = 'Strong password';
            }
        }

        ['loginUsername', 'loginPassword', 'loginMfaCode'].forEach((id) => {
            const input = document.getElementById(id);
            if (!input) return;

            input.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter') return;
                event.preventDefault();
                document.getElementById('loginForm').requestSubmit();
            });
        });

        function updateInstallAppButton() {
            const btn = document.getElementById('installAppBtn');
            if (!btn || !window.getPwaInstallState) return;

            const installState = window.getPwaInstallState();
            if (installState.isStandalone) {
                btn.style.display = 'none';
                return;
            }

            if (installState.canInstall) {
                btn.textContent = '📲 Install App';
                btn.style.display = 'inline-flex';
                return;
            }

            if (installState.isIos) {
                btn.textContent = '📲 Add to Home Screen';
                btn.style.display = 'inline-flex';
                return;
            }

            btn.style.display = 'none';
        }

        async function handleInstallApp() {
            if (!window.triggerPwaInstall) return;
            const outcome = await window.triggerPwaInstall();

            if (outcome === 'accepted') {
                showSuccess('Install started.');
            } else if (outcome === 'dismissed') {
                showError('Install canceled.');
            } else if (outcome === 'ios-instructions') {
                showSuccess('Open Safari Share and tap Add to Home Screen.');
            }
        }

        window.addEventListener('pwa-install-availability', updateInstallAppButton);
        updateInstallAppButton();

        setLoginMode('user');
        setMfaChallenge(false);

        // --- Forgot / Reset Password ---

        let _activeResetToken = null;

        function showForgotPassword() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPasswordPanel').style.display = 'block';
            document.getElementById('resetPasswordPanel').style.display = 'none';
            document.querySelector('.auth-tabs').style.display = 'none';
            hideMessages();
            document.getElementById('forgotEmail').focus();
        }

        function hideForgotPassword() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('forgotPasswordPanel').style.display = 'none';
            document.getElementById('resetPasswordPanel').style.display = 'none';
            document.querySelector('.auth-tabs').style.display = 'flex';
            hideMessages();
            _activeResetToken = null;
            const url = new URL(window.location.href);
            if (url.searchParams.has('reset_token')) {
                url.searchParams.delete('reset_token');
                history.replaceState(null, '', url);
            }
        }

        async function handleForgotPassword() {
            const email = (document.getElementById('forgotEmail').value || '').trim();
            if (!email) {
                showError('Please enter your email address.');
                return;
            }

            const btn = document.getElementById('forgotBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';
            hideMessages();

            try {
                await fetchApi('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                showSuccess('If that email is registered, a reset link has been sent. Check your inbox.');
            } catch (error) {
                showError(error.message || 'Something went wrong. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link';
            }
        }

        async function handleResetPassword() {
            const newPassword = (document.getElementById('resetNewPassword').value || '').trim();
            const confirmPassword = (document.getElementById('resetConfirmPassword').value || '').trim();

            if (!newPassword || !confirmPassword) {
                showError('Please fill in both password fields.');
                return;
            }
            if (newPassword.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Setting password...';
            hideMessages();

            try {
                await fetchApi('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: _activeResetToken, new_password: newPassword })
                });
                showSuccess('Password updated successfully! Redirecting to login...');
                setTimeout(() => {
                    hideForgotPassword();
                }, 2500);
            } catch (error) {
                showError(error.message || 'Failed to reset password. The link may have expired.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Set New Password';
            }
        }

        (function checkResetToken() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('reset_token');
            if (token) {
                _activeResetToken = token;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('forgotPasswordPanel').style.display = 'none';
                document.getElementById('resetPasswordPanel').style.display = 'block';
                document.querySelector('.auth-tabs').style.display = 'none';
                const url = new URL(window.location.href);
                url.searchParams.delete('reset_token');
                history.replaceState(null, '', url);
            }
        })();
    </script>
    <script src="/assets/pwa-register.js"></script>
