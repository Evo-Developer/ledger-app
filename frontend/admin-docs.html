<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Knowledge Base · Ledger App</title>
<style>
/* ── Reset & tokens ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d1117;
  --surface:     #161b22;
  --surface2:    #1c2128;
  --border:      #30363d;
  --text-pri:    #e6edf3;
  --text-sec:    #8b949e;
  --text-muted:  #6e7681;
  --primary:     #58a6ff;
  --primary-dim: #1f4068;
  --green:       #3fb950;
  --green-dim:   #12261e;
  --yellow:      #d29922;
  --yellow-dim:  #2d2200;
  --red:         #f85149;
  --red-dim:     #2d1517;
  --purple:      #bc8cff;
  --purple-dim:  #1e1135;
  --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --code-font:   'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  --radius:      8px;
  --sidebar-w:   260px;
  --header-h:    56px;
}
[data-theme="light"] {
  --bg:          #f6f8fa;
  --surface:     #ffffff;
  --surface2:    #f0f2f4;
  --border:      #d0d7de;
  --text-pri:    #1f2328;
  --text-sec:    #57606a;
  --text-muted:  #8c959f;
  --primary:     #0969da;
  --primary-dim: #dbeafe;
  --green-dim:   #d1fadf;
  --yellow-dim:  #fef3c7;
  --red-dim:     #fee2e2;
  --purple-dim:  #ede9fe;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-pri);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Top header ─────────────────────────────────────────────────────────── */
.kb-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
}
.kb-header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
.kb-header-brand-icon { font-size: 20px; }
.kb-header-brand-text { font-weight: 700; font-size: 15px; color: var(--text-pri); }
.kb-header-brand-tag { font-size: 10px; background: var(--primary-dim); color: var(--primary); border-radius: 4px; padding: 1px 6px; font-weight: 600; letter-spacing: 0.05em; }
.kb-search-wrap {
  flex: 1; max-width: 560px; position: relative;
}
.kb-search {
  width: 100%; padding: 8px 36px 8px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-pri); font-size: 13px;
  outline: none; transition: border-color .15s;
}
.kb-search:focus { border-color: var(--primary); }
.kb-search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }
.kb-search-count { font-size: 11px; color: var(--text-muted); position: absolute; right: 38px; top: 50%; transform: translateY(-50%); }
.kb-header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.kb-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-pri); font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: background .15s; }
.kb-btn:hover { background: var(--border); }
.kb-btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.kb-btn-primary:hover { opacity: .88; }
#authGate { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; max-width: 380px; width: 100%; text-align: center; }
.auth-card h2 { font-size: 18px; margin-bottom: 8px; }
.auth-card p { color: var(--text-sec); font-size: 13px; margin-bottom: 20px; }
.auth-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text-pri); font-size: 14px; outline: none; margin-bottom: 12px; }
.auth-input:focus { border-color: var(--primary); }
.auth-error { color: var(--red); font-size: 12px; min-height: 18px; margin-bottom: 8px; }

/* ── Layout ─────────────────────────────────────────────────────────────── */
#mainLayout { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }

/* ── Sidebar ────────────────────────────────────────────────────────────── */
.kb-sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h));
  overflow-y: auto; padding: 16px 12px;
}
.kb-sidebar-section { margin-bottom: 20px; }
.kb-sidebar-section-title { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); padding: 0 8px; margin-bottom: 6px; }
.kb-nav-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-sec);
  transition: background .1s, color .1s; border: none; background: transparent; width: 100%; text-align: left;
}
.kb-nav-item:hover { background: var(--surface2); color: var(--text-pri); }
.kb-nav-item.active { background: var(--primary-dim); color: var(--primary); font-weight: 600; }
.kb-nav-badge { margin-left: auto; font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 1px 6px; color: var(--text-muted); }
.kb-nav-item.active .kb-nav-badge { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }

/* ── Main content ───────────────────────────────────────────────────────── */
.kb-main { flex: 1; padding: 24px 32px; max-width: 960px; }

/* ── Toolbar ────────────────────────────────────────────────────────────── */
.kb-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.kb-toolbar-title { font-size: 20px; font-weight: 700; flex: 1; }
.kb-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.kb-tag-filter { padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-sec); font-size: 11px; cursor: pointer; transition: all .15s; }
.kb-tag-filter.active, .kb-tag-filter:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }

/* ── Stats strip ────────────────────────────────────────────────────────── */
.kb-stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.kb-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; flex: 1; min-width: 130px; }
.kb-stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.kb-stat-value { font-size: 22px; font-weight: 700; }

/* ── Doc cards ──────────────────────────────────────────────────────────── */
.kb-section-header { display: flex; align-items: center; gap: 10px; margin: 28px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.kb-section-icon { font-size: 18px; }
.kb-section-title { font-size: 16px; font-weight: 700; }
.kb-section-count { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; color: var(--text-muted); }

.doc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  margin-bottom: 12px; transition: border-color .15s;
  border-left: 3px solid transparent;
}
.doc-card:hover { border-color: var(--primary); }
.doc-card.priority-critical { border-left-color: var(--red); }
.doc-card.priority-high     { border-left-color: var(--yellow); }
.doc-card.priority-medium   { border-left-color: var(--primary); }
.doc-card.priority-info     { border-left-color: var(--green); }

.doc-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.doc-card-title { font-size: 14px; font-weight: 600; flex: 1; }
.doc-card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.doc-badge { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 1px 7px; border: 1px solid transparent; }
.doc-badge.critical { background: var(--red-dim); color: var(--red); border-color: rgba(248,81,73,.3); }
.doc-badge.high     { background: var(--yellow-dim); color: var(--yellow); border-color: rgba(210,153,34,.3); }
.doc-badge.medium   { background: var(--primary-dim); color: var(--primary); border-color: rgba(88,166,255,.3); }
.doc-badge.info     { background: var(--green-dim); color: var(--green); border-color: rgba(63,185,80,.3); }
.doc-badge.tag      { background: var(--surface2); color: var(--text-sec); border-color: var(--border); font-weight: 400; }
.doc-badge.new      { background: var(--purple-dim); color: var(--purple); border-color: rgba(188,140,255,.3); }

.doc-card-body { color: var(--text-sec); font-size: 13px; line-height: 1.65; }
.doc-card-body p { margin-bottom: 6px; }
.doc-card-body p:last-child { margin-bottom: 0; }
.doc-card-body ul { padding-left: 18px; margin: 6px 0; }
.doc-card-body ul li { margin-bottom: 3px; }
.doc-card-footer { margin-top: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--border); padding-top: 8px; }
.doc-card-date { font-size: 11px; color: var(--text-muted); }

pre.code-block {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-family: var(--code-font); font-size: 11.5px;
  overflow-x: auto; margin: 8px 0; color: var(--text-pri); position: relative;
}
.copy-btn {
  position: absolute; top: 6px; right: 8px; padding: 2px 8px;
  font-size: 10px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); color: var(--text-muted); cursor: pointer;
  transition: all .15s;
}
.copy-btn:hover { color: var(--text-pri); background: var(--border); }

/* ── Timeline ───────────────────────────────────────────────────────────── */
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 9px; top: 0; bottom: 0; width: 2px; background: var(--border); border-radius: 2px; }
.tl-item { position: relative; margin-bottom: 20px; }
.tl-dot { position: absolute; left: -24px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--surface); background: var(--primary); }
.tl-dot.green { background: var(--green); }
.tl-dot.yellow { background: var(--yellow); }
.tl-dot.red { background: var(--red); }
.tl-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.tl-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.tl-desc { font-size: 12px; color: var(--text-sec); }

/* ── Empty / no-results ─────────────────────────────────────────────────── */
.kb-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.kb-empty-icon { font-size: 36px; margin-bottom: 12px; }
.kb-empty-msg { font-size: 14px; }

/* ── Theme toggle ───────────────────────────────────────────────────────── */
#themeBtn { font-size: 16px; padding: 6px 10px; }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 760px) {
  .kb-sidebar { display: none; }
  .kb-main { padding: 16px; }
}
</style>
</head>
<body>

<!-- ── Auth gate ─────────────────────────────────────────────────────────── -->
<div id="authGate" style="display:none;">

    <div style="margin-top:12px;">

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="kb-header" id="kbHeader" style="display:none;">

</header>

<!-- ── Main layout ───────────────────────────────────────────────────────── -->
<div id="mainLayout" style="display:none;">
  <!-- Sidebar -->
  <nav class="kb-sidebar" id="kbSidebar">
    <div class="kb-sidebar-section">
      <div class="kb-sidebar-section-title">Views</div>
      <button class="kb-nav-item active" onclick="setView('all', this)" data-view="all">
        📄 All Entries <span class="kb-nav-badge" id="navBadge-all">0</span>
      </button>
      <button class="kb-nav-item" onclick="setView('timeline', this)" data-view="timeline">
        🕐 Changelog
      </button>
    </div>
    <div class="kb-sidebar-section">
      <div class="kb-sidebar-section-title">Categories</div>
      <!-- generated by JS -->
      <div id="catNavItems"></div>
    </div>
    <div class="kb-sidebar-section">
      <div class="kb-sidebar-section-title">Priority</div>
      <button class="kb-nav-item" onclick="filterPriority('critical', this)">🔴 Critical <span class="kb-nav-badge" id="pBadge-critical">0</span></button>
      <button class="kb-nav-item" onclick="filterPriority('high', this)">🟡 High <span class="kb-nav-badge" id="pBadge-high">0</span></button>
      <button class="kb-nav-item" onclick="filterPriority('medium', this)">🔵 Medium <span class="kb-nav-badge" id="pBadge-medium">0</span></button>
      <button class="kb-nav-item" onclick="filterPriority('info', this)">🟢 Info <span class="kb-nav-badge" id="pBadge-info">0</span></button>
    </div>
  </nav>

  <!-- Main -->
  <main class="kb-main" id="kbMain">
    <!-- Stats -->
    <div class="kb-stats" id="kbStats"></div>
    <!-- Toolbar -->
    <div class="kb-toolbar">
      <div class="kb-toolbar-title" id="viewTitle">All Documentation Entries</div>
    </div>
    <!-- Content area -->
    <div id="kbContent"></div>
  </main>
</div>

  <li><strong>grafana</strong> — Grafana 10.4.2, port 3000; auto-provisioned datasource + dashboard</li>
</ul>

// ════════════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════════════
const API_BASE = '';
let _authed = false;

function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
  } catch { return null; }
}

function showDocsApp() {
  _authed = true;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('kbHeader').style.display = 'flex';
  document.getElementById('mainLayout').style.display = 'flex';
  initApp();
}

async function fetchCurrentUser(token) {
  const res = await fetch(`${API_BASE}/api/auth/me`, {
    method: 'GET',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    }
  });

  if (!res.ok) {
    return null;
  }

  try {
    return await res.json();
  } catch {
    return null;
  }
}

function isAdminUser(user) {
  const role = (user?.role || '').toString().toLowerCase();
  return role === 'admin' || role === 'superadmin';
}

async function tryAuth() {
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (token) {
    const user = await fetchCurrentUser(token);
    if (isAdminUser(user)) {
      showDocsApp();
      return;
    }

    // Clear stale or non-admin token to avoid repeated failed bootstrap attempts.
    localStorage.removeItem('token');
    sessionStorage.removeItem('token');
  }

  document.getElementById('authGate').style.display = 'flex';
}

async function loginWithCredentials() {
  const username = (document.getElementById('authUsernameInput').value || '').trim();
  const password = document.getElementById('authPasswordInput').value || '';
  const err = document.getElementById('authError');

  if (!username || !password) {
    err.textContent = 'Please enter admin username and password.';
    return;
  }

  err.textContent = '';

  try {
    const loginRes = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!loginRes.ok) {
      let message = 'Invalid credentials.';
      try {
        const payload = await loginRes.json();
        if (payload && payload.detail) {
          message = payload.detail;
        }
      } catch {}
      err.textContent = message;
      return;
    }

    const loginPayload = await loginRes.json();
    const token = loginPayload?.access_token;
    if (!token) {
      err.textContent = 'Login succeeded but no access token was returned.';
      return;
    }

    const user = await fetchCurrentUser(token);
    if (!isAdminUser(user)) {
      err.textContent = 'This account is not an admin account.';
      return;
    }

    localStorage.setItem('token', token);
    showDocsApp();
  } catch (e) {
    err.textContent = 'Unable to reach the server. Please try again.';
  }
}

// ════════════════════════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════════════════════════
let _view = 'all';          // 'all' | 'timeline' | category name
let _priorityFilter = null;
let _searchQuery = '';
let _theme = localStorage.getItem('finapp_docs_theme') || 'dark';

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════
function initApp() {
  applyTheme(_theme);
  buildSidebar();
  renderStats();
  render();
  document.getElementById('kbSearch').focus();
}

function applyTheme(t) {
  _theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('finapp_docs_theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  applyTheme(_theme === 'dark' ? 'light' : 'dark');
}

// ════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════════════════════════════════════
function buildSidebar() {
  const cats = [...new Set(KB_DATA.map(d => d.cat))];
  const navEl = document.getElementById('catNavItems');
  navEl.innerHTML = cats.map(cat => {
    const count = KB_DATA.filter(d => d.cat === cat).length;
    const icon = catIcon(cat);
    return `<button class="kb-nav-item" onclick="setView('cat:${cat}', this)" data-view="cat:${cat}">
      ${icon} ${cat} <span class="kb-nav-badge">${count}</span>
    </button>`;
  }).join('');

  // Set priority badges
  ['critical','high','medium','info'].forEach(p => {
    const el = document.getElementById(`pBadge-${p}`);
    if (el) el.textContent = KB_DATA.filter(d => d.priority === p).length;
  });
  document.getElementById('navBadge-all').textContent = KB_DATA.length;
}

function catIcon(cat) {
  const map = {
    'Architecture': '🏗️', 'API Reference': '📡', 'Monitoring': '📊',
    'Grafana & Prometheus': '📈', 'Authentication': '🔐', 'Security': '🛡️',
    'Frontend': '🖥️', 'Financial Logic': '💰', 'Database': '🗄️',
    'Operations': '⚙️', 'Changelog': '📋',
  };
  return map[cat] || '📁';
}

// ════════════════════════════════════════════════════════════════════════════
// VIEW SWITCHING
// ════════════════════════════════════════════════════════════════════════════
function setView(view, btn) {
  _view = view;
  _priorityFilter = null;
  _searchQuery = '';
  document.getElementById('kbSearch').value = '';
  document.getElementById('searchCount').style.display = 'none';
  document.querySelectorAll('.kb-nav-item').forEach(el => el.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function filterPriority(p, btn) {
  _view = 'all';
  _priorityFilter = _priorityFilter === p ? null : p;
  document.querySelectorAll('.kb-nav-item').forEach(el => el.classList.remove('active'));
  if (_priorityFilter && btn) btn.classList.add('active');
  render();
}

function doSearch() {
  _searchQuery = document.getElementById('kbSearch').value.trim().toLowerCase();
  _view = 'all';
  _priorityFilter = null;
  document.querySelectorAll('.kb-nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector('[data-view="all"]')?.classList.add('active');
  render();
}

// ════════════════════════════════════════════════════════════════════════════
// FILTER
// ════════════════════════════════════════════════════════════════════════════
function filteredData() {
  let data = [...KB_DATA];
  if (_view === 'timeline') return data.sort((a,b) => b.date.localeCompare(a.date));
  if (_view.startsWith('cat:')) {
    const cat = _view.slice(4);
    data = data.filter(d => d.cat === cat);
  }
  if (_priorityFilter) data = data.filter(d => d.priority === _priorityFilter);
  if (_searchQuery) {
    data = data.filter(d => {
      const hay = [d.title, d.body, d.cat, (d.tags||[]).join(' '), d.code||''].join(' ').toLowerCase();
      return hay.includes(_searchQuery);
    });
  }
  return data;
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════════════
function renderStats() {
  const stats = [
    { label: 'Total Entries', value: KB_DATA.length },
    { label: 'Critical / High', value: KB_DATA.filter(d => d.priority === 'critical' || d.priority === 'high').length },
    { label: 'Categories', value: [...new Set(KB_DATA.map(d => d.cat))].length },
    { label: 'Last Updated', value: '26 Mar 2026' },
  ];
  document.getElementById('kbStats').innerHTML = stats.map(s =>
    `<div class="kb-stat"><div class="kb-stat-label">${s.label}</div><div class="kb-stat-value">${s.value}</div></div>`
  ).join('');
}

function render() {
  const data = filteredData();
  const countEl = document.getElementById('searchCount');
  document.getElementById('viewTitle').textContent = viewTitle();

  if (_searchQuery) {
    countEl.style.display = 'inline';
    countEl.textContent = `${data.length} result${data.length !== 1 ? 's' : ''}`;
  } else {
    countEl.style.display = 'none';
  }

  const content = document.getElementById('kbContent');

  if (data.length === 0) {
    content.innerHTML = `<div class="kb-empty"><div class="kb-empty-icon">🔍</div><div class="kb-empty-msg">No entries match "${_searchQuery}"</div></div>`;
    return;
  }

  if (_view === 'timeline') {
    content.innerHTML = renderTimeline(data);
    return;
  }

  // Group by category
  const groups = {};
  data.forEach(d => {
    if (!groups[d.cat]) groups[d.cat] = [];
    groups[d.cat].push(d);
  });

  content.innerHTML = Object.entries(groups).map(([cat, items]) => `
    <div class="kb-section-header">
      <span class="kb-section-icon">${catIcon(cat)}</span>
      <span class="kb-section-title">${cat}</span>
      <span class="kb-section-count">${items.length}</span>
    </div>
    ${items.map(d => renderCard(d)).join('')}
  `).join('');

  // Wire copy buttons
  content.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.closest('pre').querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    });
  });
}

function viewTitle() {
  if (_searchQuery) return `Search results for "${_searchQuery}"`;
  if (_view === 'timeline') return 'Changelog Timeline';
  if (_view.startsWith('cat:')) return _view.slice(4);
  if (_priorityFilter) return `${_priorityFilter.charAt(0).toUpperCase() + _priorityFilter.slice(1)} Priority`;
  return 'All Documentation Entries';
}

function renderCard(d) {
  const pLabel = { critical: 'CRITICAL', high: 'HIGH', medium: 'MEDIUM', info: 'INFO' }[d.priority] || d.priority.toUpperCase();
  const tags = (d.tags || []).map(t => `<span class="doc-badge tag">${t}</span>`).join('');
  const isNew = d.date >= '2026-03-18';
  const newBadge = isNew ? '<span class="doc-badge new">NEW</span>' : '';
  const codeBlock = d.code ? `<pre class="code-block"><button class="copy-btn">Copy</button><code>${escHtml(d.code.trim())}</code></pre>` : '';
  return `<div class="doc-card priority-${d.priority}">
    <div class="doc-card-header">
      <div class="doc-card-title">${d.title}</div>
      <div class="doc-card-meta">
        ${newBadge}
        <span class="doc-badge ${d.priority}">${pLabel}</span>
      </div>
    </div>
    <div class="doc-card-body">${d.body}${codeBlock}</div>
    <div class="doc-card-footer">
      <span class="doc-card-date">🗓 ${formatDate(d.date)}</span>
      ${tags}
    </div>
  </div>`;
}

function renderTimeline(data) {
  const dotColor = { critical: 'red', high: 'yellow', medium: '', info: 'green' };
  return `<div class="timeline">${data.map(d => `
    <div class="tl-item">
      <div class="tl-dot ${dotColor[d.priority] || ''}"></div>
      <div class="tl-date">${formatDate(d.date)} · ${catIcon(d.cat)} ${d.cat}</div>
      <div class="tl-title">${d.title}</div>
      <div class="tl-desc">${stripHtml(d.body).slice(0, 180)}${stripHtml(d.body).length > 180 ? '…' : ''}</div>
    </div>`).join('')}
  </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════════
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function stripHtml(s) {
  return s.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}
function formatDate(d) {
  try { return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }
  catch { return d; }
}

// ════════════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════════════
tryAuth();
</script>
