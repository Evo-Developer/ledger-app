apiVersion: 1

groups:
  - orgId: 1
    name: ledger-slo-and-db-alerts
    folder: Ledger App
    interval: 1m
    rules:
      - uid: ledger_slo_burn_rate_high
        title: SLO Burn Rate High
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: 100 * ((sum(rate(ledger_backend_errors_5xx_total[5m])) / clamp_min(sum(rate(ledger_backend_requests_total[5m])), 0.001)) / 0.001)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: gt
                    params:
                      - 100
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: SLO burn rate exceeded 100%
          runbook_url: https://localhost/admin-docs/OPERATIONS-GUIDE.md
        labels:
          severity: critical
          service: ledger-backend

      - uid: ledger_latency_breach
        title: Backend Latency Breach
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: ledger_backend_latency_ms_avg
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: gt
                    params:
                      - 500
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 3m
        annotations:
          summary: Backend average latency above 500ms
          runbook_url: https://localhost/admin-docs/OPERATIONS-GUIDE.md
        labels:
          severity: warning
          service: ledger-backend

      - uid: ledger_db_error_spike
        title: DB Error Spike
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(rate(ledger_db_errors_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: gt
                    params:
                      - 1
                  operator:
                    type: and
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Database error rate spike detected
          runbook_url: https://localhost/admin-docs/OPERATIONS-GUIDE.md
        labels:
          severity: critical
          service: ledger-db
