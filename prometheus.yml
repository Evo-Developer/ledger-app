global:
  scrape_interval: 15s       # Pull metrics every 15 seconds
  evaluation_interval: 15s   # Evaluate alerting rules every 15 seconds

scrape_configs:
  # Ledger App – FastAPI backend
  - job_name: ledger_backend
    static_configs:
      - targets:
          - backend:8000     # Docker service name; adjust if running outside Docker
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
